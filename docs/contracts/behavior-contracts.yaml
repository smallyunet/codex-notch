  - id: QUOTA-SEMANTICS-012
    title: 周额度使用绿色、黄色、深红三档告警色
    status: active
    statement: 右侧优先显示周额度的剩余百分比；数字在圆环或波浪球内部；圆环缺口从 12 点方向按顺时针表达。剩余额度高于 20% 时使用绿色，高于 10% 且不高于 20% 时使用黄色，10% 及以下使用深红色，不再随百分比连续改变色相。存在运行任务时圆环使用当前档位颜色的单色明暗渐变，不混入白色高光；未启用 Reduce Motion 时渐变沿剩余额度弧柔和流动。空闲和完成态必须立即改用当前档位的单一纯色，不能保留静态渐变或独立旋转的高光小弧。波浪球使用相同三档颜色，只在存在运行任务且未启用 Reduce Motion 时起伏，空闲和完成态保持静止液面。展开面板的额度、重置和最近对话正文均使用易读的字号和对应行高；额度条下方先保留当前周额度的精确重置时刻和秒级倒计时；其下整行“可重置 N 次”都是点击区，卡片只向下展开，逐条列出 `rate-limit-reset-credits` 中状态为 `available` 的重置券精确到期时刻和秒级倒计时，不重复显示重置券名称。设置窗口的实际刘海就是实时预览，不重复保留静态预览卡；展开面板右下角必须提供打开设置的入口。
    rationale: 大部分可用额度保持稳定绿色能降低视觉噪声；20% 开始用黄色提醒，10% 才进入深红强警报，三档边界比连续彩虹色相更清晰。运行时只改变同一档位颜色的明暗，既保留任务活动感，也避免白色高光和跨色相渐变显得花哨。
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [compact-state, quota-expanded-state, settings]
      exclude: [cost-estimation]
    examples:
      positive: 35% 显示绿色，20% 显示黄色，10% 显示深红；圆环运行时只让当前档位的单色明暗渐变沿弧移动，停止后立即变为对应纯色；圆环、波浪球、展开百分比和额度条保持同色。
      negative: 额度从红到绿连续改变色相，20% 仍显示绿色，10% 仍显示黄色，运行渐变混入突兀白色高光，或空闲与完成态继续显示渐变。
    guards:
      - Tests/CodexNotchTests/NotchTextTests.swift
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: inspect green, yellow and deep-red quota states on physical-notch hardware"
      - "manual: inspect the running monochrome gradient and stopped solid ring"
    supersedes: [QUOTA-SEMANTICS-008]
    superseded_by: null
    last_verified_commit: 778fdc9

  - id: PRIVACY-BOUNDARY-005
    title: 本机认证与对话内容不得被持久化或公开
    status: active
    statement: 认证令牌只在进程内存使用；不得写入仓库、应用缓存或日志；不得展示或记录用户消息正文；无刘海 fallback 也不得扩大内容暴露。
    rationale: 应用读取本机 ChatGPT/Codex 登录态和会话日志，最小暴露是不可降低的边界。
    source: technical-constraint
    owner: project-maintainer
    risk: critical
    scope:
      include: [auth-reader, usage-client, rollout-monitor, logs, fallback-menu]
      exclude: [user-provided project names and thread identifiers needed for navigation]
    examples:
      positive: usage 请求的 Authorization header 不进入日志；展开列表只显示摘要标题与项目名。
      negative: 提交 auth.json、打印 token、缓存完整 usage 响应或显示用户正文。
    guards:
      - Tests/CodexNotchTests/CodexAuthReaderTests.swift
      - "manual: sensitive-diff and runtime-log review until a dedicated secret scanner exists"
    supersedes: []
    superseded_by: null
    last_verified_commit: 0d37196

  - id: PACKAGE-VERIFY-006
    title: 可分发 app 必须来自已验证构建
    status: active
    statement: 任何声称可运行或可分发的 CodexNotch.app 都必须由当前工作树构建，并通过 bundle、Info.plist 和 codesign 验证；发布 zip 必须由 release 脚本生成。
    rationale: 源码测试通过不代表 app bundle 可启动或签名正确。
    source: technical-constraint
    owner: project-maintainer
    risk: medium
    scope:
      include: [build, bundle, local-release]
      exclude: [remote-release-upload]
    examples:
      positive: "./scripts/verify.sh 构建并验证 dist/CodexNotch.app。"
      negative: 只运行 `swift test` 就宣称 release 已可安装，或验证旧 bundle 后替换为新二进制。
    guards:
      - scripts/build_app.sh
      - scripts/verify_app.sh
      - scripts/verify.sh
    supersedes: []
    superseded_by: null
    last_verified_commit: 0d37196

  - id: APP-IDENTITY-007
    title: 应用包提供原创且完整的图标
    status: active
    statement: CodexNotch.app 的 Info.plist 必须声明 CodexNotch 图标，并在 Resources 中包含完整的 .icns 表示；图标使用原创的深绿终端窗口、顶部小刘海槽和绿色 `>_` 提示符矢量设计，不包含账号、认证或对话数据。
    rationale: Finder、启动台和安装包需要稳定可辨识的应用身份；清晰的终端轮廓和高对比绿色提示符应在小尺寸下保留产品的 Codex 属性，同时顶部小刘海槽呼应实体刘海。图标生成不能扩大本机数据暴露或挪用其他产品的品牌资产。
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [build, bundle, finder, launchpad]
      exclude: [notch-screens, chatgpt-assets, user-data]
    examples:
      positive: 构建后的 app 能在 Resources 中找到 CodexNotch.icns，且该文件包含 1024px 表示和原创的深绿终端 `>_` 图形。
      negative: Info.plist 指向不存在的图标，只在仓库保留设计稿而未将图标打入 app，或将图标绘制成没有终端语义的大面积碗状轮廓。
    guards:
      - Resources/AppIcon.svg
      - scripts/build_icon.sh
      - scripts/verify_app.sh
      - "manual: inspect the app icon in Finder or Launchpad"
    supersedes: []
    superseded_by: null
    last_verified_commit: 9fd7a89
