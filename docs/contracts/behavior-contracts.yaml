contracts:
  - id: MENU-BAR-001
    title: The quota is presented only in the macOS menu bar
    status: active
    statement: The app displays a system icon and the rounded remaining weekly percentage in one variable-length NSStatusItem. The icon hugs the title so both are centered as one compact unit, while the status item retains native macOS outer spacing and click behavior. It creates no notch overlay, floating panel, Dock icon, or ordinary app window.
    rationale: Native compact image-title layout matches surrounding menu bar items without fragile negative spacing or a reduced click target, and avoids screen geometry, pointer interception, and overlay privacy risks.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [menu-bar, status-menu]
      exclude: [notch-overlay, session-state]
    examples:
      positive: The menu bar shows an icon directly adjacent to 68% as one centered unit and opens a small quota menu.
      negative: The icon is pinned to one edge with excessive space before the number, or a transparent panel is positioned around the physical camera notch.
    guards:
      - Tests/CodexNotchTests/MenuBarTextTests.swift
      - "manual: inspect icon and percentage spacing on a real Mac"
    supersedes: []
    superseded_by: null
    last_verified_commit: 23b1418

  - id: QUOTA-SEMANTICS-002
    title: The displayed number is the remaining weekly percentage
    status: active
    statement: The menu bar prefers a window classified as weekly and displays 100 minus its clamped used percentage, rounded to the nearest integer. Missing data is shown as an em dash and is never fabricated from another window.
    rationale: Users need one stable number whose meaning does not change when the endpoint returns multiple windows.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [usage-parsing, menu-bar]
      exclude: [cost-estimation, reset-credit-redemption]
    examples:
      positive: A weekly used value of 31.6 produces 68% in the menu bar.
      negative: A five-hour rolling window is presented as weekly quota.
    guards:
      - Tests/CodexNotchTests/MenuBarTextTests.swift
      - Tests/CodexNotchTests/UsageWindowClassifierTests.swift
      - Tests/CodexNotchTests/CodexUsageClientTests.swift
    supersedes: []
    superseded_by: null
    last_verified_commit: 23b1418

  - id: PRIVACY-BOUNDARY-003
    title: Credentials and private Codex data remain minimally exposed
    status: active
    statement: The app reads only the bounded local auth file, keeps credentials in process memory, sends them only over HTTPS to the original ChatGPT usage host, and never scans sessions, reads prompts, logs sensitive data, caches responses, or stores cookies.
    rationale: The app handles an access token and must minimize both data access and exfiltration paths.
    source: security-review
    owner: project-maintainer
    risk: critical
    scope:
      include: [auth-reader, usage-client, network-session]
      exclude: [conversation-monitoring, telemetry, auto-update]
    examples:
      positive: One ephemeral GET request obtains usage and no response body is persisted.
      negative: A rollout JSONL file is parsed or an authenticated redirect is followed to another host.
    guards:
      - Tests/CodexNotchTests/CodexAuthReaderTests.swift
      - Tests/CodexNotchTests/CodexUsageClientTests.swift
      - "manual: sensitive string and executable dependency review"
    supersedes: []
    superseded_by: null
    last_verified_commit: 23b1418

  - id: PACKAGE-RELEASE-004
    title: Version tags produce verified GitHub release artifacts
    status: active
    statement: A vMAJOR.MINOR.PATCH tag matching Info.plist triggers CI to test, build, verify, archive, checksum, and publish the app. The release workflow must use pinned actions and must not upload credentials or local Codex data.
    rationale: Tag-driven builds reduce the risk of a manually substituted binary and make the source-to-release path reviewable.
    source: security-review
    owner: project-maintainer
    risk: high
    scope:
      include: [ci, packaging, github-release]
      exclude: [apple-notarization-without-credentials]
    examples:
      positive: Pushing v0.2.0 creates a universal ZIP and SHA-256 file after verification passes.
      negative: A release asset is uploaded manually from an unverified local build.
    guards:
      - .github/workflows/ci.yml
      - .github/workflows/release.yml
      - scripts/release.sh
      - scripts/verify_app.sh
    supersedes: []
    superseded_by: null
    last_verified_commit: 23b1418

  - id: MENU-PROGRESS-005
    title: The status menu visualizes both remaining quota and reset time
    status: active
    statement: The top of the status menu contains two labeled native progress bars. The quota bar is the clamped remaining weekly percentage. The reset bar is the clamped time remaining until reset divided by the exact window duration returned by the usage endpoint. Text labels preserve the numeric meaning, and missing reset metadata is shown as unavailable instead of using an assumed duration.
    rationale: Paired remaining-state bars make quota capacity and renewal timing scannable while keeping the calculation truthful and accessible.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [status-menu, usage-parsing, accessibility]
      exclude: [quota-prediction, hardcoded-reset-window, additional-network-data]
    examples:
      positive: With 81 percent quota remaining and two days left in a seven-day window, the bars show 81 percent and two sevenths remaining.
      negative: The reset bar assumes every window is seven days when the endpoint omits its duration.
    guards:
      - Tests/CodexNotchTests/MenuBarTextTests.swift
      - Tests/CodexNotchTests/CodexUsageClientTests.swift
      - "manual: inspect both progress bars and labels in the open menu on a real Mac"
    supersedes: []
    superseded_by: null
    last_verified_commit: pending

  - id: RESET-CREDITS-006
    title: Available rate-limit reset credits are shown without fabrication
    status: active
    statement: When the existing usage response includes a nonnegative rate_limit_reset_credits.available_count value, the status menu displays that count in a separate labeled row. Zero is displayed as an available count, while a missing or invalid value hides the row. The app does not infer a total credit capacity or merge this count with the weekly automatic reset time.
    rationale: Reset credits are useful actionable quota information, but their meaning must remain distinct from the weekly window and absent values must not be misrepresented.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [usage-parsing, status-menu, reset-credits]
      exclude: [credit-redemption, inferred-credit-capacity, additional-network-requests]
    examples:
      positive: An available_count of 2 is displayed as 2 available, and zero is displayed as 0 available.
      negative: A missing available_count is displayed as zero or as a progress percentage.
    guards:
      - Tests/CodexNotchTests/CodexUsageClientTests.swift
      - Tests/CodexNotchTests/MenuBarTextTests.swift
      - "manual: inspect the reset-credit row in the open menu on a real Mac"
    supersedes: []
    superseded_by: null
    last_verified_commit: pending
