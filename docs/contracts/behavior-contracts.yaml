contracts:
  - id: NOTCH-LAYOUT-001
    title: 紧凑岛体必须贴合物理刘海安全区
    status: superseded
    statement: 紧凑刘海的左右内容始终位于各自安全区中央，不被摄像头切口遮挡，也不下沉到刘海下方；左右指标共用 24pt 对齐容器，左侧 ChatGPT 标记可以做 22pt 的光学校正，右侧切换圆环或波浪球、或展开卡片时均不得改变容器尺寸或破坏两翼的视觉平衡。
    rationale: 用户首先感知的是物理刘海几何与两翼的视觉平衡；错误位置、机械地等尺寸或右侧样式改变外轮廓都会直接破坏观感。
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state]
      exclude: [menu-bar-fallback]
    examples:
      positive: 左图标和右额度指示器位于刘海两翼、共用 24pt 对齐容器，左标以较小本体达到视觉平衡，且紧凑面板顶边贴合屏幕顶部。
      negative: 内容整体挂在刘海下方，额度指示器被摄像头切口覆盖，或波浪球/圆环/悬停状态改变两翼指标尺寸。
    guards:
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: physical-notch compact-state inspection"
    supersedes: []
    superseded_by: NOTCH-LAYOUT-013
    last_verified_commit: 74cd749

  - id: NOTCH-LAYOUT-013
    title: 紧凑岛体保持安全区平衡，左侧 GPT 标记使用 20pt 光学校正
    status: active
    statement: 紧凑刘海的左右内容始终位于各自安全区中央，不被摄像头切口遮挡，也不下沉到刘海下方；左右指标共用 24pt 对齐容器。左侧 ChatGPT 标记本体与运行回声使用 20pt 光学校正，右侧切换圆环或波浪球、或展开卡片时均不得改变容器尺寸或破坏两翼的视觉平衡。
    rationale: 左标的实际图形密度高于右侧额度环，22pt 在真实刘海上显得偏大；收至 20pt 能保留清晰识别和运行态反馈，同时让两翼视觉重量更接近。
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state]
      exclude: [menu-bar-fallback]
    examples:
      positive: 左侧 GPT 标记与其运行回声在 24pt 容器内以 20pt 居中显示，右侧 24pt 额度指标保持原尺寸，紧凑面板顶边贴合屏幕顶部。
      negative: 通过缩小整个左侧安全区或移动右侧额度指标来补偿左标，或让运行、完成、空闲状态使用不同的左标本体尺寸。
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - "manual: physical-notch compact-state inspection across idle, running and completed states"
    supersedes: [NOTCH-LAYOUT-001]
    superseded_by: null
    last_verified_commit: 9fc374b

  - id: NOTCH-MOTION-002
    title: 展开从紧凑岛体向下发生
    status: active
    statement: 悬停展开从既有紧凑岛体向下揭示内容；外层窗口不得在 SwiftUI 布局期间持续缩放或导致闪烁、向上展开、居中炸开和鼠标拦截残留。
    rationale: 固定画布、内部岛体动画是避免窗口跳动与历史布局崩溃的必要边界。
    source: incident
    owner: project-maintainer
    risk: high
    scope:
      include: [notch-screens, hover-expand, hover-collapse]
      exclude: [menu-bar-fallback]
    examples:
      positive: 面板先准备最终画布，SwiftUI 可见岛体只向下展开，收起后透明画布回收。
      negative: 用定时器逐帧调整 NSPanel 尺寸，或从物理刘海中间同时向上、向下弹开。
    guards:
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - docs/decisions/001-fixed-canvas-notch-motion.md
      - "manual: hover expansion and collapse on physical-notch hardware"
    supersedes: []
    superseded_by: null
    last_verified_commit: 0d37196

  - id: EXPANDED-APPEARANCE-009
    title: 展开卡片外观可在系统玻璃与纯黑之间实时切换
    status: superseded
    statement: 设置页必须提供“玻璃”和“黑色”两种展开卡片外观并立即应用，默认使用玻璃。macOS 26 及以上使用系统原生 Liquid Glass，仍受支持的旧系统使用原生半透明 Material 降级；黑色模式保持既有纯黑表面。该设置只改变展开卡片材质，不得改变紧凑刘海的纯黑表面、固定透明画布、展开方向或窗口几何。
    rationale: 原生系统材质能跟随桌面内容和指针产生一致的最新 macOS 观感，纯黑选项则保留高对比偏好；将材质选择与窗口几何隔离可避免重新引入展开跳动和鼠标拦截回归。
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [expanded-state, settings, notch-screens]
      exclude: [compact-state, menu-bar-fallback]
    examples:
      positive: 设置为玻璃后真实展开卡片立即显示系统玻璃表面，设置为黑色后立即恢复纯黑；收起后的紧凑刘海始终为纯黑。
      negative: 玻璃设置也让紧凑刘海透明、切换后必须重启、旧系统无法展开，或为材质动画重新逐帧改变 NSPanel 尺寸。
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - docs/decisions/002-native-liquid-glass-with-fallback.md
      - "manual: switch both appearances and inspect expansion on physical-notch hardware"
    supersedes: []
    superseded_by: EXPANDED-APPEARANCE-011
    last_verified_commit: 916f72b

  - id: EXPANDED-APPEARANCE-011
    title: 展开卡片固定使用稳定纯黑表面
    status: active
    statement: 紧凑与展开状态的可见刘海表面必须始终使用纯黑背景，设置页不得提供无法在日常显示中成立的玻璃外观选项；隐藏态画布仍保持完全透明。该选择不得改变固定透明画布、只向下展开、收起后回收画布或窗口几何。
    rationale: 物理刘海机器确认跨窗口玻璃在日常显示中仍是黑色，仅在触发系统截图时出现白色透视效果，不能作为稳定可交付的用户体验；固定纯黑能保持真实显示与设置承诺一致。
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [expanded-state, settings, notch-screens]
      exclude: [menu-bar-fallback]
    examples:
      positive: 日常悬停展开时卡片稳定为纯黑，设置页只保留实际可用的展开内容设置，收起后透明画布照常回收。
      negative: 设置页仍显示玻璃选项，或把只在截图合成路径中出现的透明效果当成真实日常显示通过。
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - docs/decisions/003-abandon-cross-window-liquid-glass.md
      - "manual: inspect the expanded black surface during normal use on physical-notch hardware"
    supersedes: [EXPANDED-APPEARANCE-009]
    superseded_by: null
    last_verified_commit: 53beec8

  - id: DISPLAY-TRANSITION-010
    title: 投屏与屏幕变化不得触发菜单栏 fallback 递归
    status: active
    statement: 投屏、断开投屏或其他屏幕参数变化在刘海窗口与菜单栏 fallback 之间切换时，必须保持应用存活。NSStatusItem 写入的可见性和 autosave 偏好不得被当作应用设置再次触发运行态渲染；运行协调器只响应确实影响其状态或布局的应用偏好。
    rationale: macOS 在创建、显示或隐藏 NSStatusItem 时会同步写入 UserDefaults；如果宽泛监听所有偏好并立即重建 fallback，会发生重入递归和主线程栈溢出。
    source: incident
    owner: project-maintainer
    risk: high
    scope:
      include: [screen-parameter-changes, notch-screens, menu-bar-fallback, settings]
      exclude: [quota-fetching, rollout-parsing]
    examples:
      positive: 开始或停止投屏后应用继续运行，菜单栏 fallback 可以正常出现或隐藏，最近聊天条数变化仍实时更新布局。
      negative: 投屏触发屏幕变化后反复创建 NSStatusItem，或系统菜单栏可见性偏好导致 render 递归直至应用退出。
    guards:
      - Tests/CodexNotchTests/NotchRuntimePreferencesTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: connect and disconnect screen projection while a task is running"
    supersedes: []
    superseded_by: null
    last_verified_commit: 14271f5

  - id: ACTIVITY-STATE-003
    title: 活动任务优先，完成状态可见
    status: active
    statement: 有任一活动任务时紧凑刘海显示运行态；没有活动任务但存在最近完成记录时显示完成对号；没有两者时仍显示额度；新任务必须覆盖旧完成态。
    rationale: 用户需要在不展开卡片时区分正在运行、刚完成和纯额度状态。
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [compact-state, expanded-state, rollout-session-monitoring]
      exclude: [task-termination]
    examples:
      positive: 完成记录存在时，收起的刘海仍可看到左侧绿色对号；新会话出现后立刻变为运行态。
      negative: 完成对号只在展开卡片内可见，或旧完成态覆盖新运行任务。
    guards:
      - Tests/CodexNotchTests/NotchPresentationReducerTests.swift
      - Tests/CodexNotchTests/ActiveSessionStoreTests.swift
      - "manual: observe compact completion state after a real task finishes"
    supersedes: []
    superseded_by: null
    last_verified_commit: 0d37196

  - id: QUOTA-SEMANTICS-004
    title: 周额度以剩余百分比清晰表达
    status: superseded
    statement: 右侧优先显示周额度的剩余百分比；数字在圆环或波浪球内部；圆环缺口从 12 点方向按顺时针表达，额度高为绿色、低于 20% 为红色。存在运行任务且未启用 Reduce Motion 时，圆环的渐变色沿剩余额度弧柔和流动；空闲和完成态保持静止渐变，不能保留独立旋转的高光小弧。波浪球只在存在运行任务且未启用 Reduce Motion 时起伏，空闲和完成态保持静止液面。展开面板的额度、重置和最近对话正文均使用易读的字号和对应行高；额度条下方先保留当前周额度的精确重置时刻和秒级倒计时；其下整行“可重置 N 次”都是点击区，卡片只向下展开，逐条列出 `rate-limit-reset-credits` 中状态为 `available` 的重置券精确到期时刻和秒级倒计时，不重复显示重置券名称。设置窗口的实际刘海就是实时预览，不重复保留静态预览卡；展开面板右下角必须提供打开设置的入口。
    rationale: 这是应用的主要信息目标，不能因动画、布局或过小字号而模糊、重复或误用滚动窗口；当前周额度的 reset_at 与重置券的 expires_at 是两类不同信息，必须分别展示。所有行的名称在当前界面都相同，重复显示会挤占时间的可读空间。重置券明细只读，不在刘海中触发“使用重置”。实时刘海比设置窗口的伪造静态预览更可信，空闲时持续波动也会错误暗示任务仍在运行；沿剩余额度弧流动的渐变比独立旋转的高光更像额度本身的活动状态。
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [compact-state, quota-expanded-state, settings]
      exclude: [cost-estimation]
    examples:
      positive: weekly window 存在时显示剩余数字；展开正文的额度、重置和最近对话均清晰可读；额度条下方保留当前周额度的重置时刻与倒计时；整行“可重置 N 次”任一点均可点击，点击后以大字号列出所有 status=available 的 expires_at 和倒计时，且不重复显示 Full reset；波浪球文字不遮挡液面，并且只在任务运行时起伏；圆环只在任务运行时让渐变沿剩余额度弧流动；设置页不重复展示预览卡，展开面板右下角能打开设置；20% 临界值仍是绿色。
      negative: 只返回滚动窗口却伪造周额度，用额度窗口 reset_at 代替重置券 expires_at，展示已兑换的重置券，触发重置操作，或重置明细向上展开；空闲时波浪或圆环渐变持续流动，圆环额外出现独立旋转的小弧，或设置页仍保留与实际刘海不同步的静态预览。
    guards:
      - Tests/CodexNotchTests/CodexUsageClientTests.swift
      - Tests/CodexNotchTests/NotchTextTests.swift
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: expanded quota panel inspection"
      - "manual: ring and wave-ball inspection"
    supersedes: []
    superseded_by: QUOTA-SEMANTICS-008
    last_verified_commit: 2796cfe

  - id: QUOTA-SEMANTICS-008
    title: 周额度以剩余百分比清晰表达
    status: superseded
    statement: 右侧优先显示周额度的剩余百分比；数字在圆环或波浪球内部；圆环缺口从 12 点方向按顺时针表达，额度高为绿色、低于 20% 为红色。存在运行任务时圆环使用渐变色，未启用 Reduce Motion 时渐变沿剩余额度弧柔和流动；空闲和完成态必须立即改用当前额度对应的单一纯色，不能保留静态渐变或独立旋转的高光小弧。波浪球只在存在运行任务且未启用 Reduce Motion 时起伏，空闲和完成态保持静止液面。展开面板的额度、重置和最近对话正文均使用易读的字号和对应行高；额度条下方先保留当前周额度的精确重置时刻和秒级倒计时；其下整行“可重置 N 次”都是点击区，卡片只向下展开，逐条列出 `rate-limit-reset-credits` 中状态为 `available` 的重置券精确到期时刻和秒级倒计时，不重复显示重置券名称。设置窗口的实际刘海就是实时预览，不重复保留静态预览卡；展开面板右下角必须提供打开设置的入口。
